# Uncommenting `tauri` without first running `cargo tauri init` (which generates
# tauri.conf.json, build.rs, icons/, capabilities/, and a frontend skeleton)
# produces a confusing build failure. See crates/atelier-gui/README.md →
# "Bootstrap" for the numbered checklist; choices made there (frontend stack,
# bundle identifier, capability set) shouldn't be made in a hurry.
#
# tauri = { workspace = true }
# tokio = { workspace = true }
# tracing-subscriber = { workspace = true }

# [build-dependencies]
# tauri-build = { workspace = true }   # uncomment after tauri init produces build.rs
