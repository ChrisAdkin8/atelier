[package]
name = "atelier-gui"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Atelier Tauri 2.x shell. Consumes atelier-core over a broadcast channel. See spec §3."

[[bin]]
name = "atelier-gui"
path = "src/main.rs"

[dependencies]
atelier-core = { workspace = true }

# === IMPLEMENTOR: DO NOT UNCOMMENT THESE LINES YET ===
