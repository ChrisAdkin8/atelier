name: check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rig:
    name: rig (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Set up Node (for t11)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      # Single source of truth for rig deps: pyproject.toml [project.optional-dependencies] rig.
      # Bump versions there, not here.
      - name: Install rig dependencies
        run: pip install ".[rig]"

      - name: Schema meta-validation
        run: python tests/validate_schemas.py

      - name: Artifact validation
        run: python tests/validate_artifacts.py

      - name: Rig self-tests
        run: pytest tests/test_schemas.py tests/test_validators.py tests/test_runner.py tests/test_ci.py -q

      - name: Workload dry-run (every task's starting state matches declared expected_starting_returncode)
        run: python tests/workload/runner/runner.py --task all --dry-run --summary

  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Explicitly install the toolchain pinned in rust-toolchain.toml so the
      # download happens once, before any cargo step, and the components
      # (rustfmt, clippy) are reliably present. Auto-installing via stale rustup
      # has bitten us on the macos runner before. Action pinned to @v1 (the
      # major version tag) rather than @stable — `@stable` follows the action's
      # default branch and is a moving target; @v1 is the supported semver pin.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.85.0"
          components: rustfmt, clippy

      # Tauri 2 (atelier-gui) pulls glib-sys / webkit2gtk-4.1-sys via build.rs;
      # those need GTK + WebKit system libraries that ubuntu-latest doesn't
      # ship. Package set tracks Tauri's official Linux prerequisites; bump
      # webkit2gtk-4.1-dev → 4.2 when the runner moves past 24.04. macOS uses
      # the system WebKit framework so this step is Linux-only.
      - name: Install Tauri Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      # Cache key includes rust-toolchain.toml so a channel bump invalidates the
      # cache. Without it, an old toolchain's target/ artefacts get reused.
      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-toolchain.toml', '**/Cargo.toml') }}

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test atelier-core
        run: cargo test -p atelier-core

  # Cheap supply-chain + dead-dep gate. Reads Cargo.lock / Cargo.toml
  # only — no toolchain build, no Tauri system deps. Runs alongside
  # `rust` rather than as a step inside it so a slow advisory-DB fetch
  # doesn't block fmt/clippy reporting. Linux-only: the gate's outputs
  # are platform-independent (the advisory DB doesn't differ by host)
  # and machete walks Cargo.toml not target/, so a second OS would
  # just duplicate effort.
  quality:
    name: quality (cargo-audit + cargo-machete)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.85.0"

      # Pre-built binaries from GitHub releases — avoids compiling the
      # tools (and their transitive deps that need rustc > 1.85)
      # against our pinned toolchain. cargo-machete pinned to 0.7.0
      # for the same toolchain-compat reason captured in the Makefile.
      - name: Install cargo-audit + cargo-machete
        uses: taiki-e/install-action@b550161ef8a7bc4f2a671c0b03a18ac9ccedea1e # v2.79.1
        with:
          tool: cargo-audit,cargo-machete@0.7.0

      - name: Run quality-cheap
        run: make quality-cheap

  # Stricter supply-chain gate (v60.35 M28). Pairs the existing
  # `quality` job (`cargo audit` informational + `cargo machete`)
  # with `cargo audit --deny warnings` plus the atelier-gui
  # `npm audit --audit-level=high` surface that `quality` doesn't
  # touch. The audit DB fetch is the slow step (~5s); the npm
  # audit reads the lockfile only, no `npm install`.
  audit:
    name: audit (cargo audit + npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.85.0"

      - name: Set up Node (for npm audit)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Cache the cargo-audit binary so subsequent runs skip the
      # install. Key includes the action's choice of tool version
      # (cargo-audit) so a bump invalidates the cache. v60.33's
      # SHA-pin sweep will replace the @v2 tag.
      - name: Cache cargo-audit binary
        id: cache-cargo-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit-v1

      - name: Install cargo-audit
        if: steps.cache-cargo-audit.outputs.cache-hit != 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run make audit
        run: make audit
