name: nightly_phase_b_gate

# Phase B §2 real-model conformance gate. Runs the canonical priority
# subset (t01, t02, t05, t06, t10) against `anthropic:claude-haiku-4-5`
# (and hosted OpenAI when `OPENAI_API_KEY` is wired) and captures
# per-strategy `ConformanceSummary` rows + the aggregate
# `ConformanceStatus` verdict per
# `schemas/ci/protocol_conformance.v1.json`. Records the result to
# `tests/phase_b_gate/last_run.json`, validates against the schema, and
# commits the refreshed artifact back to main.
#
# Distinct from `nightly_phase_a_gate.yml`: Phase A's gate covers the
# *mechanical* gates (fmt / clippy / workspace tests / rig / live
# Anthropic). Phase B's gate measures the *conformance rate* of the
# live runs at envelope-parse granularity. The two stay separate so
# their failure surfaces don't entangle — a flaky Anthropic API call
# on a Tuesday night shouldn't drag Phase B's calibration window
# along with it.
#
# Calibration discipline per `tasks/phase_b_closeout.md` decision row
# #3 + **L-D-6**: the first 7 nights run with `calibration_phase: true`
# in the artifact — the workflow records the rate but does NOT assert
# against the floor. After 7 green nights, the maintainer flips
# `CALIBRATION_PHASE` below to `false` (or removes the env var) and
# future runs assert at `max(0.95, observed_p5)` from the rolling
# 7-day window.
#
# v60.36 H1/H2 — privilege-split:
#   * `measure` job runs with `permissions: contents: read`, downloads
#     the Rust + Python toolchains and resolves Cargo + PyPI deps. A
#     malicious transitive dep here can read the workspace and inspect
#     runtime URLs but cannot push back to `main`.
#   * `commit` job runs with `permissions: contents: write` and is
#     restricted to `actions/checkout` + `actions/download-artifact` +
#     stock `git` from the runner image. No untrusted dep resolution.

on:
  schedule:
    # 07:00 UTC — 30 minutes after `nightly_phase_a_gate.yml` (06:30)
    # so the two nightly commits don't race the same git ref.
    - cron: "0 7 * * *"
  workflow_dispatch:

# Default to the safest permission. The `commit` job re-declares
# `contents: write` for itself only.
permissions:
  contents: read

# Serialise the three nightlies that commit to main (phase A + phase B +
# protocol-overhead). `cancel-in-progress: false` lets the earlier-scheduled
# run finish its push before the next one starts, so we never race the
# `git pull --rebase origin main` step below.
concurrency:
  group: nightly-artifact-commits
  cancel-in-progress: false

jobs:
  measure:
    name: measure phase B §2 conformance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      all_passed: ${{ steps.compose.outputs.all_passed }}
    env:
      # Flip to "false" after the 7-night calibration window completes.
      # See `tasks/phase_b_closeout.md` Track A definition of done.
      CALIBRATION_PHASE: "true"
      PHASE_B_FLOOR: "0.95"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.85.0"
          components: rustfmt, clippy

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      # Tauri 2 (atelier-gui) system deps — same posture as
      # nightly_phase_a_gate. Phase B's workflow doesn't build the GUI
      # binary, but `cargo` resolves the workspace metadata up front
      # and would fail on missing system libs.
      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install rig dependencies
        run: pip install ".[rig]"

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: nightly-phase-b-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml', '**/Cargo.toml') }}

      # Phase B §2 live-conformance gate against Anthropic. Mirrors the
      # Phase A live gate but emits per-strategy `ConformanceSummary`
      # rows by piping the runner's emit history through the new
      # `phase_b_conformance_record_against_anthropic` test (which
      # writes a temp summary file the compose step reads).
      - name: Gate — phase B live (Anthropic)
        id: phase_b_anthropic
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set +e
          start=$(date +%s)
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "ANTHROPIC_API_KEY not set; live conformance gate will be recorded as skipped."
            end=$(date +%s)
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
            echo "duration=$((end - start))" >> "$GITHUB_OUTPUT"
            echo "is_skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # The phase_b_live_anthropic_conformance test runs the canonical
          # priority subset, records each envelope-parse outcome into a
          # `ConformanceSnapshot`, and writes a per-strategy summary to
          # the path in $ATELIER_PHASE_B_SUMMARY_PATH so this workflow can
          # compose the artifact from it.
          export ATELIER_PHASE_B_SUMMARY_PATH="$RUNNER_TEMP/phase_b_summary.json"
          cargo test -p atelier-cli --test run_integration \
            phase_b_live_anthropic_conformance -- --include-ignored --nocapture
          ec=$?
          end=$(date +%s)
          echo "exit_code=$ec" >> "$GITHUB_OUTPUT"
          echo "duration=$((end - start))" >> "$GITHUB_OUTPUT"
          echo "is_skipped=false" >> "$GITHUB_OUTPUT"
          echo "summary_path=$ATELIER_PHASE_B_SUMMARY_PATH" >> "$GITHUB_OUTPUT"
          exit $ec

      # Compose the artifact + commit + push. Uses the per-strategy
      # summary from the test above (when present) or an empty
      # `summaries: []` array (when skipped) so the schema's
      # `minItems: 0` is honoured.
      - name: Compose phase_b_gate/last_run.json
        id: compose
        run: |
          set -e
          run_id=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          git_sha=$(git rev-parse --short HEAD)

          if [ "${{ steps.phase_b_anthropic.outputs.is_skipped }}" = "true" ]; then
            # Skipped: empty summaries, status=yellow (no evidence),
            # all_passed=true (the workflow stays green for forks /
            # pre-maintainer-setup).
            status="yellow"
            calibration="${CALIBRATION_PHASE}"
            all_passed="true"
            summaries='[]'
          else
            # Read the per-strategy summary the test produced. If the
            # test crashed before writing the file, treat that as a
            # failure (status=red, all_passed=false).
            if [ ! -f "${{ steps.phase_b_anthropic.outputs.summary_path }}" ]; then
              status="red"
              calibration="${CALIBRATION_PHASE}"
              all_passed="false"
              summaries='[]'
            else
              summaries=$(cat "${{ steps.phase_b_anthropic.outputs.summary_path }}")
              # During calibration, every run is yellow + all_passed=true.
              # Post-calibration the workflow computes status via the
              # Rust ConformanceStatus::for_run lattice (binary call
              # below) — for now we keep the records-only posture.
              if [ "${CALIBRATION_PHASE}" = "true" ]; then
                status="yellow"
                all_passed="true"
                calibration="true"
              else
                # Post-calibration: invoke the binary in --evaluate mode
                # to compute the verdict. Placeholder for the v60.24+
                # extension — for now the artifact records status=yellow
                # so we don't pre-emptively flip red during calibration.
                status="yellow"
                all_passed="true"
                calibration="false"
              fi
            fi
          fi

          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          cat > tests/phase_b_gate/last_run.json <<EOF
          {
            "version": 1,
            "run_id": "$run_id",
            "git_sha": "$git_sha",
            "workflow_run_url": "$run_url",
            "all_passed": $all_passed,
            "status": "$status",
            "calibration_phase": $calibration,
            "floor": ${PHASE_B_FLOOR},
            "summaries": $summaries,
            "providers_tested": ["anthropic:claude-haiku-4-5"]
          }
          EOF

          # Surface the binary's digest in the job summary.
          cargo build --release -p atelier-cli --bin conformance_status
          ./target/release/conformance_status >> "$GITHUB_STEP_SUMMARY" || true

          echo "all_passed=$all_passed" >> "$GITHUB_OUTPUT"

      - name: Validate fresh artifact against schema
        run: python tests/validate_artifacts.py

      - name: Upload refreshed last_run.json
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: phase-b-gate-last-run
          path: tests/phase_b_gate/last_run.json
          if-no-files-found: error
          retention-days: 1

  commit:
    name: commit refreshed last_run.json
    needs: measure
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download refreshed last_run.json
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: phase-b-gate-last-run
          path: tests/phase_b_gate/

      - name: Commit refreshed last_run.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet tests/phase_b_gate/last_run.json; then
            echo "No change to tests/phase_b_gate/last_run.json; skipping commit."
            exit 0
          fi
          git config user.name  "atelier-nightly[bot]"
          git config user.email "atelier-nightly@users.noreply.github.com"
          git add tests/phase_b_gate/last_run.json
          git commit -m "nightly: refresh Phase B §2 conformance gate result"
          if ! git pull --rebase origin main; then
            echo "::error::git pull --rebase failed — another nightly's commit conflicts with this one. Inspect tests/phase_b_gate/last_run.json on main and re-run."
            git rebase --abort || true
            exit 1
          fi
          git push origin HEAD:main

      - name: Surface failure
        if: needs.measure.outputs.all_passed != 'true'
        run: |
          echo "::error::Phase B §2 conformance gate red — see tests/phase_b_gate/last_run.json on main."
          exit 1
