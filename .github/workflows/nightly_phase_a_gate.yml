name: nightly_phase_a_gate

# Phase A mechanical gate. Runs the workspace-level checks the Phase A
# scope hangs on (fmt, clippy, workspace tests, rig + canonical
# workloads, npx-gated MCP integration), records each gate's outcome
# to tests/phase_a_gate/last_run.json per schemas/ci/phase_a_gate.v1.json,
# commits the refreshed artifact back to main, and validates it against
# its schema before exit.
#
# Distinct from `nightly_protocol_overhead.yml`, which only measures the
# §2 overhead surface. This workflow is the "are Phase A's mechanical
# gates green" probe; the `atelier-phase-a-gate-status` binary
# (crates/atelier-cli/src/bin/phase_a_gate_status.rs) reads the
# committed artifact for downstream consumers.
#
# Self-contained live-model gate (v60.86). The workflow starts a tiny
# OpenAI-compatible llama.cpp server on the GitHub-hosted runner and drives
# the harness against it. This deliberately avoids paid hosted APIs and repo
# secrets while still exercising the real OpenAI-compatible adapter path.
#
# v60.36 H1/H2 — privilege-split:
#   * `measure` job runs with `permissions: contents: read`, downloads
#     the Rust + Python toolchains and resolves Cargo + PyPI deps. A
#     malicious transitive dep here can read the workspace and inspect
#     runtime URLs but cannot push back to `main`.
#   * `commit` job runs with `permissions: contents: write` and is
#     restricted to `actions/checkout` + `actions/download-artifact` +
#     stock `git` from the runner image. No untrusted dep resolution.
#   * The artifact + the `all_passed` flag cross the job boundary via
#     `actions/upload-artifact` and a job output, respectively.

on:
  schedule:
    # 06:30 UTC — 30 minutes after nightly_protocol_overhead so the
    # two nightly commits don't race the same git ref.
    - cron: "30 6 * * *"
  workflow_dispatch:

# Default to the safest permission. The `commit` job re-declares
# `contents: write` for itself only.
permissions:
  contents: read

# Serialise the three nightlies that commit to main (phase A + phase B +
# protocol-overhead). `cancel-in-progress: false` lets the earlier-scheduled
# run finish its push before the next one starts, so we never race the
# `git pull --rebase origin main` step below.
concurrency:
  group: nightly-artifact-commits
  cancel-in-progress: false

jobs:
  measure:
    name: measure phase A gates
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    outputs:
      all_passed: ${{ steps.compose.outputs.all_passed }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.85.0"
          components: rustfmt, clippy

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Set up Node (for npx + the MCP integration gate)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      # Tauri 2 (atelier-gui) pulls glib-sys / webkit2gtk-4.1-sys via
      # build.rs; those need GTK + WebKit system libraries that
      # ubuntu-latest doesn't ship. Tracking the per-PR check.yml's
      # package list — bump together when ubuntu-latest moves past 24.04.
      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install rig dependencies
        run: pip install ".[rig]"

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: nightly-phase-a-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml', '**/Cargo.toml') }}

      - name: Cache local LLM model
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/atelier-local-llm
          key: nightly-phase-a-qwen2.5-coder-1.5b-instruct-q2-k-v1

      # The per-gate steps below run with `set +e` + `continue-on-error`
      # so a failure in one doesn't short-circuit the others — the
      # nightly is most useful when it tells you EVERY broken gate, not
      # the first one. Each step captures its exit code into a step
      # output that the JSON-build step reads.

      - name: Gate — fmt
        id: fmt
        continue-on-error: true
        run: |
          set +e
          start=$(date +%s)
          cargo fmt --all -- --check
          ec=$?
          end=$(date +%s)
          echo "exit_code=$ec" >> "$GITHUB_OUTPUT"
          echo "duration=$((end - start))" >> "$GITHUB_OUTPUT"
          exit $ec

      - name: Gate — clippy
        id: clippy
        continue-on-error: true
        run: |
          set +e
          start=$(date +%s)
          cargo clippy --workspace --all-targets -- -D warnings
          ec=$?
          end=$(date +%s)
          echo "exit_code=$ec" >> "$GITHUB_OUTPUT"
          echo "duration=$((end - start))" >> "$GITHUB_OUTPUT"
          exit $ec

      - name: Gate — cargo test workspace
        id: cargo_test
        continue-on-error: true
        run: |
          set +e
          start=$(date +%s)
          cargo test --workspace
          ec=$?
          end=$(date +%s)
          echo "exit_code=$ec" >> "$GITHUB_OUTPUT"
          echo "duration=$((end - start))" >> "$GITHUB_OUTPUT"
          exit $ec

      - name: Gate — make check (rig)
        id: rig
        continue-on-error: true
        run: |
          set +e
          start=$(date +%s)
          make check
          ec=$?
          end=$(date +%s)
          echo "exit_code=$ec" >> "$GITHUB_OUTPUT"
          echo "duration=$((end - start))" >> "$GITHUB_OUTPUT"
          exit $ec

      # The MCP integration tests are gated #[ignore] (they spawn
      # `npx @modelcontextprotocol/server-filesystem`). The nightly
      # opts them in with --include-ignored. A failure here is
      # informational, not red — the network/registry can be flaky
      # in a way that's not the harness's fault — so we still flag
      # it but do NOT flip `all_passed` to false.
      - name: Gate — mcp integration (npx)
        id: mcp
        continue-on-error: true
        run: |
          set +e
          start=$(date +%s)
          cargo test -p atelier-cli --test mcp_integration -- --include-ignored
          ec=$?
          end=$(date +%s)
          echo "exit_code=$ec" >> "$GITHUB_OUTPUT"
          echo "duration=$((end - start))" >> "$GITHUB_OUTPUT"
          exit $ec

      - name: Download local LLM model
        run: |
          set -euo pipefail
          model_dir="$HOME/.cache/atelier-local-llm"
          model_file="$model_dir/qwen2.5-coder-1.5b-instruct-q2_k.gguf"
          mkdir -p "$model_dir"
          if [ ! -s "$model_file" ]; then
            curl -fL --retry 3 --retry-delay 5 \
              "https://huggingface.co/Qwen/Qwen2.5-Coder-1.5B-Instruct-GGUF/resolve/main/qwen2.5-coder-1.5b-instruct-q2_k.gguf" \
              -o "$model_file"
          fi
          ls -lh "$model_file"

      - name: Start local OpenAI-compatible LLM
        run: |
          set -euo pipefail
          docker rm -f atelier-local-llm >/dev/null 2>&1 || true
          docker run -d \
            --name atelier-local-llm \
            -p 127.0.0.1:8000:8000 \
            -v "$HOME/.cache/atelier-local-llm:/models:ro" \
            ghcr.io/ggml-org/llama.cpp:server \
            -m /models/qwen2.5-coder-1.5b-instruct-q2_k.gguf \
            --host 0.0.0.0 \
            --port 8000 \
            --ctx-size 4096 \
            --n-predict 512 \
            --threads 4 \
            --parallel 1 \
            --jinja

          for _ in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:8000/v1/models >/dev/null; then
              curl -fsS http://127.0.0.1:8000/v1/models
              exit 0
            fi
            sleep 2
          done

          docker logs atelier-local-llm
          exit 1

      # Self-contained local-model gate. The runner has no GPU, so this
      # intentionally uses a tiny quantized coder model and the smallest
      # priority canonical task as a nightly smoke test. It replaces the
      # previous Anthropic gate without needing ANTHROPIC_API_KEY or API credit.
      - name: Gate — phase A live (local OpenAI-compatible LLM)
        id: phase_a_live
        continue-on-error: true
        env:
          ATELIER_LOCAL_LLM_URL: http://127.0.0.1:8000/v1
          ATELIER_LOCAL_MODEL_ID: local:qwen2.5-coder-1.5b-instruct-q2_k
        run: |
          set +e
          start=$(date +%s)
          cargo test -p atelier-cli --test run_integration \
            phase_a_live_openai_compat_t01 -- --include-ignored --test-threads=1
          ec=$?
          end=$(date +%s)
          if [ "$ec" -ne 0 ]; then
            docker logs atelier-local-llm || true
          fi
          echo "exit_code=$ec" >> "$GITHUB_OUTPUT"
          echo "duration=$((end - start))" >> "$GITHUB_OUTPUT"
          echo "is_skipped=false" >> "$GITHUB_OUTPUT"
          exit $ec

      # Build the JSON artifact + commit + push.
      #
      # v60.37 C3/CI-5 — the heredoc below builds JSON via a Python
      # one-liner instead of interpolating `${{ steps.X.outputs.Y }}`
      # directly. Before this change, any step output that grew a
      # quote, newline, or backslash (today they're all simple integers;
      # tomorrow they might not be) would silently produce malformed
      # JSON. The step-output values are surfaced to Python via
      # environment variables so the `json.dumps` call handles quoting
      # for us.
      - name: Compose phase_a_gate/last_run.json
        id: compose
        env:
          FMT_EXIT: ${{ steps.fmt.outputs.exit_code }}
          FMT_DUR: ${{ steps.fmt.outputs.duration }}
          CLIPPY_EXIT: ${{ steps.clippy.outputs.exit_code }}
          CLIPPY_DUR: ${{ steps.clippy.outputs.duration }}
          CARGO_EXIT: ${{ steps.cargo_test.outputs.exit_code }}
          CARGO_DUR: ${{ steps.cargo_test.outputs.duration }}
          RIG_EXIT: ${{ steps.rig.outputs.exit_code }}
          RIG_DUR: ${{ steps.rig.outputs.duration }}
          MCP_EXIT: ${{ steps.mcp.outputs.exit_code }}
          MCP_DUR: ${{ steps.mcp.outputs.duration }}
          PHASE_A_LIVE_EXIT: ${{ steps.phase_a_live.outputs.exit_code }}
          PHASE_A_LIVE_DUR: ${{ steps.phase_a_live.outputs.duration }}
          PHASE_A_LIVE_SKIPPED: ${{ steps.phase_a_live.outputs.is_skipped }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -e
          # Map step exit codes → status strings. 0 = passed, anything
          # else = failed. We don't emit `skipped` from the workflow
          # because every gate above actually runs; `skipped` is reserved
          # for prerequisite-missing situations (e.g. local runs without
          # a Python venv).
          python3 - <<'PY'
          import json, os, subprocess

          def status_for(env_name):
              return "passed" if os.environ.get(env_name) == "0" else "failed"

          fmt_status = status_for("FMT_EXIT")
          clippy_status = status_for("CLIPPY_EXIT")
          cargo_status = status_for("CARGO_EXIT")
          rig_status = status_for("RIG_EXIT")
          mcp_status = status_for("MCP_EXIT")
          if os.environ.get("PHASE_A_LIVE_SKIPPED") == "true":
              phase_a_live_status = "skipped"
          else:
              phase_a_live_status = status_for("PHASE_A_LIVE_EXIT")

          # The MCP gate is non-fatal. The local live-model gate is fatal:
          # it has no external secret or paid-account prerequisite, so a
          # failure means the self-contained smoke gate regressed.
          all_passed = (
              fmt_status == "passed"
              and clippy_status == "passed"
              and cargo_status == "passed"
              and rig_status == "passed"
              and phase_a_live_status != "failed"
          )

          def dur(name):
              raw = os.environ.get(name, "0")
              try:
                  return int(raw)
              except ValueError:
                  return 0

          payload = {
              "version": 1,
              "run_id": subprocess.check_output(
                  ["date", "-u", "+%Y-%m-%dT%H:%M:%SZ"], text=True
              ).strip(),
              "git_sha": subprocess.check_output(
                  ["git", "rev-parse", "--short", "HEAD"], text=True
              ).strip(),
              "workflow_run_url": os.environ["RUN_URL"],
              "all_passed": all_passed,
              "gates": [
                  {"name": "fmt", "status": fmt_status, "duration_secs": dur("FMT_DUR")},
                  {"name": "clippy", "status": clippy_status, "duration_secs": dur("CLIPPY_DUR")},
                  {"name": "cargo_test_workspace", "status": cargo_status, "duration_secs": dur("CARGO_DUR")},
                  {"name": "rig_check", "status": rig_status, "duration_secs": dur("RIG_DUR")},
                  {"name": "mcp_integration_npx", "status": mcp_status, "duration_secs": dur("MCP_DUR")},
                  {"name": "phase_a_live_local_llm", "status": phase_a_live_status, "duration_secs": dur("PHASE_A_LIVE_DUR")},
              ],
          }
          with open("tests/phase_a_gate/last_run.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, indent=2, allow_nan=False)
              f.write("\n")

          # Surface all_passed to subsequent steps.
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"all_passed={'true' if all_passed else 'false'}\n")
          PY

          # Surface the binary's digest in the job summary.
          cargo build --release -p atelier-cli --bin phase_a_gate_status
          ./target/release/phase_a_gate_status >> "$GITHUB_STEP_SUMMARY" || true

      - name: Validate fresh artifact against schema
        run: python tests/validate_artifacts.py

      - name: Upload refreshed last_run.json
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: phase-a-gate-last-run
          path: tests/phase_a_gate/last_run.json
          if-no-files-found: error
          retention-days: 1

  commit:
    name: commit refreshed last_run.json
    needs: measure
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download refreshed last_run.json
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: phase-a-gate-last-run
          path: tests/phase_a_gate/

      - name: Commit refreshed last_run.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet tests/phase_a_gate/last_run.json; then
            echo "No change to tests/phase_a_gate/last_run.json; skipping commit."
            exit 0
          fi
          git config user.name  "atelier-nightly[bot]"
          git config user.email "atelier-nightly@users.noreply.github.com"
          git add tests/phase_a_gate/last_run.json
          git commit -m "nightly: refresh Phase A gate result"
          # Rebase onto the latest main before pushing — a sibling nightly may
          # have committed a different gate's artifact between checkout and now.
          # On conflict, abort the workflow loudly so the operator can inspect.
          if ! git pull --rebase origin main; then
            echo "::error::git pull --rebase failed — another nightly's commit conflicts with this one. Inspect tests/phase_a_gate/last_run.json on main and re-run."
            git rebase --abort || true
            exit 1
          fi
          git push origin HEAD:main

      - name: Surface failure
        if: needs.measure.outputs.all_passed != 'true'
        run: |
          echo "::error::Phase A gate red — at least one of fmt/clippy/cargo_test/rig/phase_a_live_anthropic failed. See per-step logs above and tests/phase_a_gate/last_run.json on main."
          exit 1
