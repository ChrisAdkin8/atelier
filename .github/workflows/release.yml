name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to package, e.g. v0.1.0"
        required: true
        type: string

permissions:
  contents: read

jobs:
  cli:
    name: cli (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: x86_64-unknown-linux-gnu
          - os: macos-14
            label: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.85.0"

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libdbus-1-dev \
            pkg-config

      - name: Build CLI
        run: cargo build --locked --release -p atelier-cli

      - name: Package CLI
        run: |
          set -euo pipefail
          mkdir -p "dist/atelier-cli-${{ matrix.label }}"
          cp target/release/atelier "dist/atelier-cli-${{ matrix.label }}/atelier"
          tar -C dist -czf "atelier-cli-${{ matrix.label }}.tar.gz" "atelier-cli-${{ matrix.label }}"
          shasum -a 256 "atelier-cli-${{ matrix.label }}.tar.gz" > "atelier-cli-${{ matrix.label }}.tar.gz.sha256"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: atelier-cli-${{ matrix.label }}
          path: |
            atelier-cli-${{ matrix.label }}.tar.gz
            atelier-cli-${{ matrix.label }}.tar.gz.sha256
          if-no-files-found: error

  gui:
    name: gui (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: x86_64-linux
            bundles: appimage,deb
          - os: macos-14
            label: aarch64-macos
            bundles: dmg
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.85.0"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: crates/atelier-gui/ui/package-lock.json

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libdbus-1-dev \
            pkg-config

      - name: Install frontend dependencies
        run: npm --prefix crates/atelier-gui/ui ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build GUI bundle
        run: cargo tauri build --bundles "${{ matrix.bundles }}"
        working-directory: crates/atelier-gui

      - name: Package GUI bundle
        run: |
          set -euo pipefail
          mkdir -p release-gui
          find target/release/bundle -type f \
            \( -name '*.AppImage' -o -name '*.deb' -o -name '*.dmg' \) \
            -print -exec cp {} release-gui/ \;
          test "$(find release-gui -type f | wc -l)" -gt 0
          (
            cd release-gui
            shasum -a 256 * > "atelier-gui-${{ matrix.label }}.sha256"
          )

      - name: Upload GUI artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: atelier-gui-${{ matrix.label }}
          path: release-gui/*
          if-no-files-found: error

  publish-draft:
    name: publish draft release
    needs: [cli, gui]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="$REF_NAME"
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$INPUT_TAG"
          fi

          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --draft \
              --verify-tag \
              --title "Atelier $tag" \
              --notes "Draft release generated by the release workflow. Review artifacts, signing status, and notes before publishing."
          fi

          find release-assets -maxdepth 2 -type f -print0 \
            | xargs -0 gh release upload "$tag" --clobber
