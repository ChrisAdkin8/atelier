name: nightly_protocol_overhead

# §2 protocol-overhead nightly. Runs the in-tree `atelier protocol-overhead`
# subcommand against the scripted MockAdapter fixtures, commits the
# refreshed `tests/protocol/overhead.json`, and fails the workflow on
# >10% drift vs. the rolling 7-day median already stored in the file's
# `rolling_median` field. The harness writes the file even when the
# regression check fails so the next nightly's baseline stays current.
#
# Why MockAdapter rather than real providers: that path needs credentials
# this public workflow can't see. `ci/nightly/README.md` documents the
# credentialed path which lands in Phase E.
#
# v60.36 H1/H2 — privilege-split:
#   * `measure` job runs with `permissions: contents: read`, downloads
#     the Rust toolchain and resolves Cargo deps. A malicious transitive
#     dep here can read the workspace and inspect runtime URLs but
#     cannot push back to `main`.
#   * `commit` job runs with `permissions: contents: write` and is
#     restricted to `actions/checkout` + `actions/download-artifact` +
#     stock `git` from the runner image. No untrusted dep resolution.
#   * The artifact + the `all_passed` flag cross the job boundary via
#     `actions/upload-artifact` and a job output, respectively.

on:
  schedule:
    # 06:00 UTC — late enough that yesterday's commits have settled,
    # early enough that the result is queryable by Pacific morning.
    - cron: "0 6 * * *"
  workflow_dispatch:

# Default to the safest permission. The `commit` job re-declares
# `contents: write` for itself only.
permissions:
  contents: read

# Serialise the three nightlies that commit to main (phase A + phase B +
# protocol-overhead). `cancel-in-progress: false` lets the earlier-scheduled
# run finish its push before the next one starts, so we never race the
# `git pull --rebase origin main` step below.
concurrency:
  group: nightly-artifact-commits
  cancel-in-progress: false

jobs:
  measure:
    name: measure overhead + check regression
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      exit_code: ${{ steps.measure.outputs.exit_code }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.85.0"
          components: rustfmt

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: nightly-overhead-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml', '**/Cargo.toml') }}

      - name: Build atelier CLI (release)
        run: cargo build --release -p atelier-cli

      # The regression check exits 3 on drift. We still need to commit
      # the file (its `rolling_median` slides), so capture the exit code
      # separately and bubble it up at the end of the job.
      - name: Measure protocol overhead
        id: measure
        run: |
          set +e
          ./target/release/atelier protocol-overhead --check-regression
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e

      # Validate the freshly written file against its schema before
      # committing. Catches a schema break the same day rather than
      # waiting for the next per-PR `check` workflow run.
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install rig dependencies
        run: pip install ".[rig]"

      - name: Validate overhead.json against schema
        run: python tests/validate_artifacts.py

      - name: Upload refreshed overhead.json
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: protocol-overhead-json
          path: tests/protocol/overhead.json
          if-no-files-found: error
          retention-days: 1

  commit:
    name: commit refreshed overhead.json
    needs: measure
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download refreshed overhead.json
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: protocol-overhead-json
          path: tests/protocol/

      - name: Commit refreshed overhead.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet tests/protocol/overhead.json; then
            echo "No change to tests/protocol/overhead.json; skipping commit."
            exit 0
          fi
          git config user.name  "atelier-nightly[bot]"
          git config user.email "atelier-nightly@users.noreply.github.com"
          git add tests/protocol/overhead.json
          git commit -m "nightly: refresh protocol overhead measurements"
          if ! git pull --rebase origin main; then
            echo "::error::git pull --rebase failed — another nightly's commit conflicts with this one. Inspect tests/protocol/overhead.json on main and re-run."
            git rebase --abort || true
            exit 1
          fi
          git push origin HEAD:main

      - name: Surface regression
        if: needs.measure.outputs.exit_code != '0'
        run: |
          echo "::error::Protocol overhead regression detected (exit code ${{ needs.measure.outputs.exit_code }}). See run logs above."
          exit 1
