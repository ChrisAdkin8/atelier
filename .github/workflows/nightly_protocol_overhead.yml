name: nightly_protocol_overhead

# §2 protocol-overhead nightly. Runs the in-tree `atelier protocol-overhead`
# subcommand against the scripted MockAdapter fixtures, commits the
# refreshed `tests/protocol/overhead.json`, and fails the workflow on
# >10% drift vs. the rolling 7-day median already stored in the file's
# `rolling_median` field. The harness writes the file even when the
# regression check fails so the next nightly's baseline stays current.
#
# Why MockAdapter rather than real providers: that path needs credentials
# this public workflow can't see. `ci/nightly/README.md` documents the
# credentialed path which lands in Phase E.

on:
  schedule:
    # 06:00 UTC — late enough that yesterday's commits have settled,
    # early enough that the result is queryable by Pacific morning.
    - cron: "0 6 * * *"
  workflow_dispatch:

# Need write permission to commit the refreshed JSON back to main.
permissions:
  contents: write

jobs:
  measure:
    name: measure overhead + check regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Default token; commits go back to main via the action below.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.85.0"
          components: rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: nightly-overhead-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml', '**/Cargo.toml') }}

      - name: Build atelier CLI (release)
        run: cargo build --release -p atelier-cli

      # The regression check exits 3 on drift. We still need to commit
      # the file (its `rolling_median` slides), so capture the exit code
      # separately and bubble it up at the end of the job.
      - name: Measure protocol overhead
        id: measure
        run: |
          set +e
          ./target/release/atelier protocol-overhead --check-regression
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e

      # Validate the freshly written file against its schema before
      # committing. Catches a schema break the same day rather than
      # waiting for the next per-PR `check` workflow run.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install rig dependencies
        run: pip install ".[rig]"

      - name: Validate overhead.json against schema
        run: python tests/validate_artifacts.py

      - name: Commit refreshed overhead.json
        run: |
          if git diff --quiet tests/protocol/overhead.json; then
            echo "No change to tests/protocol/overhead.json; skipping commit."
            exit 0
          fi
          git config user.name  "atelier-nightly[bot]"
          git config user.email "atelier-nightly@users.noreply.github.com"
          git add tests/protocol/overhead.json
          git commit -m "nightly: refresh protocol overhead measurements"
          git push origin HEAD:main

      - name: Surface regression
        if: steps.measure.outputs.exit_code != '0'
        run: |
          echo "::error::Protocol overhead regression detected (exit code ${{ steps.measure.outputs.exit_code }}). See run logs above."
          exit 1
