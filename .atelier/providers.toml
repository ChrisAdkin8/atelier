default = "qwen2.5-72b-awq"

# Local Qwen3 4B (DWQ-quantized) via mlx-lm server.
# Start the server with:
#   mlx_lm.server --model mlx-community/Qwen3-4B-4bit-DWQ \
#     --host 127.0.0.1 --port 8080 \
#     --chat-template-args '{"enable_thinking": false}'
#
# The `enable_thinking: false` flag is required: without it, Qwen3 routes
# its response into `message.reasoning` instead of `message.content`, which
# atelier's openai-compat adapter does not read.
[providers."qwen3-4b-dwq"]
provider      = "openai-compat"
base_url      = "http://127.0.0.1:8080/v1"
model         = "mlx-community/Qwen3-4B-4bit-DWQ"
cache_prompt  = true

# Smaller demoware profile — useful for confirming wiring, not for real work.
# Switch to it with `atelier run --profile qwen3-0.6b ...`.
[providers."qwen3-0.6b"]
provider = "openai-compat"
base_url = "http://127.0.0.1:8080/v1"
model    = "mlx-community/Qwen3-0.6B-4bit"

# Qwen3.5 27B via Ollama — reliable native tool use, good sub-agent candidate.
[providers.qwen27b]
provider = "openai-compat"
base_url = "http://localhost:11434/v1"
model    = "local:qwen3.5:27b"

# Qwen2.5 72B AWQ via the self-hosted vLLM OpenAI-compatible endpoint.
[providers."qwen2.5-72b-awq"]
provider = "openai-compat"
base_url = "http://atelier-gpu-vllm-dev-1460977764.us-east-1.elb.amazonaws.com/v1"
model    = "qwen2.5-72b-instruct-awq"
api_key = "keyring:atelier/providers/qwen2.5-72b-awq"

# Per-task routing: tool-result turns go to the fast 4B executor; planning
# turns and user-facing replies stay on the primary (27B) planner.
# Set executor = "qwen3-4b-dwq" to activate once both servers are running.
[routing]
executor = "qwen2.5-72b-awq"
planner  = "qwen2.5-72b-awq"

[runner]
max_turns = 32

# Let the harness probe-on-first-use; the §1 conformance tracker will
# degrade NativeTool → JsonSentinel → RegexProse if the 0.6B model can't
# hold a tool-call format. Override with `--no-probe` to skip.
[probe]
policy = "auto"
