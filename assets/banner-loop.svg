<?xml version="1.0" encoding="UTF-8"?>
<!-- atelier banner — agent-loop diagram (spec §2.5). Verifying state is the highlight:
     "done is a state, not a claim." Re-render:
       rsvg-convert -w 3200 -h 800 -f png assets/banner-loop.svg -o assets/banner-loop.png -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" width="1600" height="400"
     role="img" aria-label="atelier agent loop: AwaitingUser → Streaming → ToolExecuting → Verifying → AwaitingUser">
  <title>atelier — agent loop</title>
  <desc>State machine: AwaitingUser, Streaming, ToolExecuting, Verifying. The Verifying state is highlighted; done is a state, not a claim.</desc>

  <defs>
    <!-- Filled triangle arrowhead -->
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9aa6b3"/>
    </marker>
    <marker id="arr-umber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c89968"/>
    </marker>
  </defs>

  <!-- Near-black warm background -->
  <rect width="1600" height="400" fill="#0e1116"/>

  <!-- Compact wordmark, top-left, small (subordinate to the diagram) -->
  <text x="80" y="60"
        font-family="'Iowan Old Style', Georgia, serif"
        font-size="36"
        letter-spacing="-1"
        fill="#f0ead6">atelier</text>
  <text x="80" y="86"
        font-family="Menlo, 'SF Mono', monospace"
        font-size="11"
        letter-spacing="2.5"
        fill="#7d8492">SPEC §2.5 · AGENT LOOP</text>

  <!-- Brief description line — top-center, the headline of what atelier is -->
  <text x="800" y="118" text-anchor="middle"
        font-family="'Iowan Old Style', Georgia, serif"
        font-size="26"
        font-style="italic"
        fill="#cfc6a8">a coding harness for BYOM agents — the agent loop, MCP transport, and verification gates between a model and your repo</text>

  <!-- State boxes — rounded rects -->
  <!-- 1. AwaitingUser -->
  <g>
    <rect x="120" y="170" width="240" height="84" rx="4" ry="4"
          fill="none" stroke="#9aa6b3" stroke-width="1.5"/>
    <text x="240" y="208" text-anchor="middle"
          font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
          font-size="20" fill="#f0ead6" font-weight="500">AwaitingUser</text>
    <text x="240" y="234" text-anchor="middle"
          font-family="Menlo, monospace" font-size="11" letter-spacing="1.5"
          fill="#7d8492">IDLE</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="368" y1="212" x2="442" y2="212" stroke="#9aa6b3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 2. Streaming -->
  <g>
    <rect x="450" y="170" width="220" height="84" rx="4" ry="4"
          fill="none" stroke="#9aa6b3" stroke-width="1.5"/>
    <text x="560" y="208" text-anchor="middle"
          font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
          font-size="20" fill="#f0ead6" font-weight="500">Streaming</text>
    <text x="560" y="234" text-anchor="middle"
          font-family="Menlo, monospace" font-size="11" letter-spacing="1.5"
          fill="#7d8492">MODEL · TOKENS</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="678" y1="212" x2="752" y2="212" stroke="#9aa6b3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3. ToolExecuting -->
  <g>
    <rect x="760" y="170" width="260" height="84" rx="4" ry="4"
          fill="none" stroke="#9aa6b3" stroke-width="1.5"/>
    <text x="890" y="208" text-anchor="middle"
          font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
          font-size="20" fill="#f0ead6" font-weight="500">ToolExecuting</text>
    <text x="890" y="234" text-anchor="middle"
          font-family="Menlo, monospace" font-size="11" letter-spacing="1.5"
          fill="#7d8492">MCP · FILE · SHELL</text>
  </g>

  <!-- Arrow 3 (into highlighted state — umber) -->
  <line x1="1028" y1="212" x2="1102" y2="212" stroke="#c89968" stroke-width="1.8" marker-end="url(#arr-umber)"/>

  <!-- 4. Verifying — HIGHLIGHTED (umber stroke, filled hint, the point of the banner) -->
  <g>
    <rect x="1110" y="170" width="220" height="84" rx="4" ry="4"
          fill="#1c1612" stroke="#c89968" stroke-width="2.2"/>
    <text x="1220" y="208" text-anchor="middle"
          font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
          font-size="20" fill="#f0ead6" font-weight="600">Verifying</text>
    <text x="1220" y="234" text-anchor="middle"
          font-family="Menlo, monospace" font-size="11" letter-spacing="1.5"
          fill="#c89968">GATES · TESTS · DIFF</text>
  </g>

  <!-- Loop-back arrow: from Verifying → AwaitingUser, curving below -->
  <path d="M 1220 254 C 1220 340, 240 340, 240 254"
        fill="none" stroke="#c89968" stroke-width="1.5" stroke-dasharray="0"
        marker-end="url(#arr-umber)"/>
  <!-- Loop label -->
  <text x="730" y="334" text-anchor="middle"
        font-family="'Iowan Old Style', Georgia, serif"
        font-size="20" font-style="italic" fill="#c89968">done is a state, not a claim</text>

  <!-- Bottom-right meta -->
  <text x="1520" y="378" text-anchor="end"
        font-family="Menlo, monospace" font-size="11" letter-spacing="2"
        fill="#5b626c">BYOM · MCP · RUST</text>
</svg>
