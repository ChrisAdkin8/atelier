<?xml version="1.0" encoding="UTF-8"?>
<!-- atelier banner — blueprint / drafting-paper aesthetic.
     Re-render:  rsvg-convert -w 3200 -h 800 -f png assets/banner-blueprint.svg -o assets/banner-blueprint.png -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" width="1600" height="400" role="img" aria-label="atelier — spec-first coding harness">
  <title>atelier</title>
  <desc>atelier — a spec-first coding harness for bring-your-own-model agents. Blueprint variant.</desc>

  <!-- Defs: dot-grid pattern -->
  <defs>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#c8baa3" opacity="0.55"/>
    </pattern>
  </defs>

  <!-- Paper background -->
  <rect width="1600" height="400" fill="#f1ead9"/>
  <!-- Dot grid overlay -->
  <rect width="1600" height="400" fill="url(#dots)"/>

  <!-- Construction lines (architect's guides), very faint dashed -->
  <g stroke="#b9a98c" stroke-width="0.8" stroke-dasharray="3 5" opacity="0.7" fill="none">
    <!-- Cap-height guide -->
    <line x1="80"  y1="92"  x2="1520" y2="92"/>
    <!-- Baseline guide -->
    <line x1="80"  y1="240" x2="1520" y2="240"/>
    <!-- Left margin -->
    <line x1="120" y1="40"  x2="120"  y2="360"/>
    <!-- Right margin -->
    <line x1="1480" y1="40" x2="1480" y2="360"/>
  </g>

  <!-- Architectural corner markers (top-left + bottom-right L-brackets) -->
  <g stroke="#1a2e4a" stroke-width="1.5" fill="none" opacity="0.7">
    <path d="M 80 40 L 80 80 L 120 80"/>
    <path d="M 1520 360 L 1520 320 L 1480 320"/>
  </g>

  <!-- Tiny coordinate label, like a drawing reference -->
  <text x="92" y="64"
        font-family="Menlo, 'SF Mono', monospace"
        font-size="11"
        letter-spacing="1.5"
        fill="#1a2e4a"
        opacity="0.65">A · 01</text>
  <text x="1488" y="346"
        font-family="Menlo, 'SF Mono', monospace"
        font-size="11"
        letter-spacing="1.5"
        fill="#1a2e4a"
        opacity="0.65">REV v13</text>

  <!-- Wordmark in deep ink -->
  <text x="138" y="232"
        font-family="'Iowan Old Style', Georgia, 'Times New Roman', serif"
        font-size="200"
        font-weight="400"
        letter-spacing="-3"
        fill="#1a2e4a">atelier</text>

  <!-- Thin ink rule -->
  <line x1="138" y1="270" x2="1062" y2="270"
        stroke="#1a2e4a" stroke-width="1.5"/>

  <!-- Italic tagline -->
  <text x="138" y="312"
        font-family="'Iowan Old Style', Georgia, 'Times New Roman', serif"
        font-size="30"
        font-style="italic"
        fill="#2c3e5a">spec-first coding harness for BYOM agents</text>

  <!-- Technical-drawing metadata strip -->
  <text x="138" y="354"
        font-family="Menlo, 'SF Mono', 'Courier New', monospace"
        font-size="15"
        letter-spacing="2.5"
        fill="#806d4f">DWG  §2.5  ·  20 SCHEMAS  ·  11 FIXTURES  ·  109 RIG TESTS</text>
</svg>
