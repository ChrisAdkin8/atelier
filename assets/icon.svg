<!-- atelier app icon — lowercase 'a' in Iowan Old Style Roman, the same font
     the banner wordmark uses (assets/banner-loop.svg line 28). Colour
     #f0ead6 also matches the banner wordmark exactly.

     The glyph is a baked path rather than an SVG <text> element: at icon
     font-sizes rsvg/Pango auto-selects Iowan Old Style Titling (the display
     variant with thin verticals and slab feet) instead of Roman. Baking the
     Roman outline at design time via Core Text removes the font-selection
     step; rsvg now rasterises a pre-resolved path.

     Path generated via assets/glyph-to-path.swift; the centring transform puts
     the path's bbox centre on canvas (512, 512). Regenerate after a macOS font
     update by re-running the helper with arguments "IowanOldStyle-Roman a 900". -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024"
     role="img" aria-label="atelier — a monogram">
  <title>atelier</title>

  <!-- Apple's macOS Big Sur+ "Production icon" template: 1024×1024 canvas with
       the rounded body inscribed in an 824×824 inner grid (≈100 px padding on
       each side) so the icon visually matches system apps in the Dock and
       Cmd+Tab. Body corner radius keeps the same 22.4% ratio of the body's
       side. -->
  <rect x="100" y="100" width="824" height="824" rx="185" ry="185" fill="#0e1116"/>

  <!-- Baked 'a' glyph from IowanOldStyle-Roman at font-size 900 (chosen so the
       lowercase x-height occupies similar visual space to the prior 'A' at
       font-size 660). scale(1 -1) flips Core Text's Y-up coordinates to
       SVG's Y-down; translate(278.43 727.55) centres the glyph's bbox on
       canvas (512, 512). Numbers from glyph-to-path.swift output (bbox
       center cx=233.57, cy=215.55 → 512-233.57=278.43, 512-(-215.55)=727.55). -->
  <g transform="translate(278.43 727.55) scale(1 -1)" fill="#f0ead6">
