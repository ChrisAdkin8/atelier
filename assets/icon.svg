<?xml version="1.0" encoding="UTF-8"?>
<!-- atelier app icon — capital A in the macOS system UI font (SF Pro Regular,
     `.SFNS-Regular`). Matches the font GitHub renders the README in on macOS.

     The 'A' is a baked glyph path rather than an SVG <text> element: rsvg/Pango
     can't access the protected system font directly, and at icon sizes any
     fallback selection produces a visibly different glyph. Baking the SF Pro
     outline at design time via Core Text removes the font-selection step;
     rsvg now rasterises a pre-resolved path.

     Path generated via assets/glyph-to-path.swift; the centring transform puts
     the path's bbox centre on canvas (512, 512). Regenerate after a macOS font
     update by re-running the helper with arguments "system A 660". -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024"
     role="img" aria-label="atelier — A monogram">
  <title>atelier</title>

  <!-- Apple's macOS Big Sur+ "Production icon" template: 1024×1024 canvas with
       the rounded body inscribed in an 824×824 inner grid (≈100 px padding on
       each side) so the icon visually matches system apps in the Dock and
       Cmd+Tab. Body corner radius keeps the same 22.4% ratio of the body's
       side. -->
  <rect x="100" y="100" width="824" height="824" rx="185" ry="185" fill="#0e1116"/>

  <!-- Baked 'A' glyph from .SFNS-Regular at font-size 660.
       scale(1 -1) flips Core Text's Y-up coordinates to SVG's Y-down;
       translate(302.36 744.51) centres the glyph's bbox on canvas (512, 512).
       Numbers from assets/glyph-to-path.swift output (bbox center cx=209.64,
       cy=232.51 → 512-209.64=302.36, 512-(-232.51)=744.51). -->
  <g transform="translate(302.36 744.51) scale(1 -1)" fill="#f0ead6">
    <path d="M8.056640625 0.0 L181.11328125 465.029296875 L223.974609375 465.029296875 L223.974609375 395.419921875 L209.150390625 395.419921875 L68.96484375 0.0 Z M87.333984375 133.095703125 L106.669921875 182.40234375 L312.919921875 182.40234375 L332.255859375 133.095703125 Z M350.302734375 0.0 L210.439453125 395.419921875 L210.439453125 465.029296875 L238.4765625 465.029296875 L411.2109375 0.0 Z"/>
  </g>
</svg>
