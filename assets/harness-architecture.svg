<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1150" viewBox="0 0 1800 1150">
  <defs>
    <style>
      .bg { fill: #0f1117; }
      .title { fill: #f0ead6; font: 700 44px "Iowan Old Style", Georgia, serif; }
      .subtitle { fill: #c8c3b2; font: 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .section { fill: #171b24; stroke: #444b5c; stroke-width: 3; rx: 24; }
      .panel { fill: #202634; stroke: #67708a; stroke-width: 2; rx: 18; }
      .panel2 { fill: #182331; stroke: #4e8098; stroke-width: 2; rx: 18; }
      .guard { fill: #241f2d; stroke: #b68cff; stroke-width: 2; rx: 18; }
      .data { fill: #1d2a23; stroke: #64b486; stroke-width: 2; rx: 18; }
      .external { fill: #2a211d; stroke: #c58b61; stroke-width: 2; rx: 18; }
      .label { fill: #f0ead6; font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #d8d3c4; font: 15.5px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tiny { fill: #b9b4a6; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .note { fill: #9fb4d8; font: 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .arrow { stroke: #b8c7e6; stroke-width: 3.25; stroke-linejoin: round; fill: none; marker-end: url(#arrow); }
      .arrow2 { stroke: #7cc7a2; stroke-width: 3.25; stroke-linejoin: round; fill: none; marker-end: url(#arrowGreen); }
      .arrow3 { stroke: #d7a46f; stroke-width: 3.25; stroke-linejoin: round; fill: none; marker-end: url(#arrowOrange); }
      .dash { stroke-dasharray: 10 8; }
    </style>
    <marker id="arrow" markerWidth="13.5" markerHeight="13.5" refX="12" refY="6.75" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1.25,1.5 L12,6.75 L1.25,12 z" fill="#b8c7e6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="13.5" markerHeight="13.5" refX="12" refY="6.75" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1.25,1.5 L12,6.75 L1.25,12 z" fill="#7cc7a2"/>
    </marker>
    <marker id="arrowOrange" markerWidth="13.5" markerHeight="13.5" refX="12" refY="6.75" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1.25,1.5 L12,6.75 L1.25,12 z" fill="#d7a46f"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1150"/>

  <g transform="translate(0,-20)">
  <rect class="section" x="55" y="150" width="430" height="430"/>
  <text class="label" x="85" y="190">User-facing surfaces</text>

  <rect class="panel" x="85" y="220" width="370" height="82"/>
  <text class="label" x="110" y="250">atelier CLI</text>
  <text class="small" x="110" y="276">Headless runs, skills, profiles</text>

  <rect class="panel" x="85" y="330" width="370" height="92"/>
  <text class="label" x="110" y="360">ratatui TUI</text>
  <text class="small" x="110" y="386">Live agent workspace</text>
  <text class="tiny" x="110" y="408">Diff, approval, skills, LSP prompts</text>

  <rect class="panel" x="85" y="450" width="370" height="98"/>
  <text class="label" x="110" y="480">Tauri GUI</text>
  <text class="small" x="110" y="506">Chat-REPL workspace</text>
  <text class="tiny" x="110" y="528">Context, memory, plan, meters</text>

  <rect class="section" x="535" y="150" width="500" height="430"/>
