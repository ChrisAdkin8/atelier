<?xml version="1.0" encoding="UTF-8"?>
<!-- atelier banner — cyanotype variant: white text on drafting-paper blue.
     Re-render:  rsvg-convert -w 3200 -h 800 -f png assets/banner-cyanotype.svg -o assets/banner-cyanotype.png -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" width="1600" height="400" role="img" aria-label="atelier — spec-first coding harness">
  <title>atelier</title>
  <desc>atelier — a spec-first coding harness for bring-your-own-model agents. Cyanotype variant.</desc>

  <defs>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#f0f4f7" opacity="0.18"/>
    </pattern>
  </defs>

  <!-- Cyanotype background -->
  <rect width="1600" height="400" fill="#1a3a5c"/>
  <!-- Dot grid -->
  <rect width="1600" height="400" fill="url(#dots)"/>

  <!-- Construction lines: cap-height, baseline, margins -->
  <g stroke="#f0f4f7" stroke-width="0.8" stroke-dasharray="3 5" opacity="0.35" fill="none">
    <line x1="80"   y1="92"  x2="1520" y2="92"/>
    <line x1="80"   y1="240" x2="1520" y2="240"/>
    <line x1="120"  y1="40"  x2="120"  y2="360"/>
    <line x1="1480" y1="40"  x2="1480" y2="360"/>
  </g>

  <!-- L-bracket corner markers -->
  <g stroke="#f0f4f7" stroke-width="1.5" fill="none" opacity="0.75">
    <path d="M 80 40 L 80 80 L 120 80"/>
    <path d="M 1520 360 L 1520 320 L 1480 320"/>
  </g>

  <!-- Drawing reference labels -->
  <text x="92" y="64"
        font-family="Menlo, 'SF Mono', monospace"
        font-size="11"
        letter-spacing="1.5"
        fill="#f0f4f7"
        opacity="0.7">A · 01</text>
  <text x="1488" y="346"
        font-family="Menlo, 'SF Mono', monospace"
        font-size="11"
        letter-spacing="1.5"
        fill="#f0f4f7"
        opacity="0.7">REV v13</text>

  <!-- Wordmark in white -->
  <text x="138" y="232"
        font-family="'Iowan Old Style', Georgia, 'Times New Roman', serif"
        font-size="200"
        font-weight="400"
        letter-spacing="-3"
        fill="#f0f4f7">atelier</text>

  <!-- Thin white rule -->
  <line x1="138" y1="270" x2="1062" y2="270"
        stroke="#f0f4f7" stroke-width="1.5"/>

  <!-- Italic tagline -->
  <text x="138" y="312"
        font-family="'Iowan Old Style', Georgia, 'Times New Roman', serif"
        font-size="30"
        font-style="italic"
        fill="#cdd7e0">spec-first coding harness for BYOM agents</text>

  <!-- Technical-drawing metadata strip -->
  <text x="138" y="354"
        font-family="Menlo, 'SF Mono', 'Courier New', monospace"
        font-size="15"
        letter-spacing="2.5"
        fill="#8fa3b8">DWG  §2.5  ·  20 SCHEMAS  ·  11 FIXTURES  ·  109 RIG TESTS</text>
</svg>
